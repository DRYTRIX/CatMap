# Render Blueprint for CatMap.
# Deploy: push to GitHub, then Render Dashboard → New → Blueprint → select repo.
databases:
  - name: catmap-db
    databaseName: catmap
    user: catmap
    plan: free

services:
  - type: web
    name: catmap-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: catmap-db
          property: connectionString
      # Render's connection string starts with postgresql://; SQLAlchemy needs
      # the psycopg driver. Override here with the +psycopg form if needed, or
      # the app normalizes it (see app/database.py note in README).
      # Still required for direct API access; the frontend proxies /api same-origin.
      - key: CORS_ORIGINS
        value: https://catmap-frontend.onrender.com
      - key: MAX_UPLOAD_MB
        value: "10"

  - type: web
    name: catmap-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      # Empty = browser calls /api on the frontend origin (nginx proxies to backend).
      - key: VITE_API_BASE
        value: ""
      - key: BACKEND_URL
        value: https://catmap-backend.onrender.com
      - key: BACKEND_HOST
        value: catmap-backend.onrender.com
      - key: VITE_GA_MEASUREMENT_ID
        value: G-0000000000