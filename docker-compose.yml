services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catmap
      POSTGRES_PASSWORD: catmap
      POSTGRES_DB: catmap
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catmap"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://catmap:catmap@db:5432/catmap
      CORS_ORIGINS: "*"
      MAX_UPLOAD_MB: "10"
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Browser talks to the backend via the host-exposed port.
        VITE_API_BASE: "http://localhost:8000"
    environment:
      PORT: "80"
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
