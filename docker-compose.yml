services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catmap
      POSTGRES_PASSWORD: catmap
      POSTGRES_DB: catmap
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catmap"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://catmap:catmap@db:5432/catmap
      CORS_ORIGINS: "*"
      PUBLIC_SITE_URL: http://localhost:5173
      MAX_UPLOAD_MB: "10"
      CAT_DETECTION_ENABLED: "true"
      CAT_DETECTION_THRESHOLD: "0.20"
      CAT_DETECTION_STRICT: "true"
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ""
    environment:
      PORT: "80"
      BACKEND_URL: http://backend:8000
      BACKEND_HOST: backend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
