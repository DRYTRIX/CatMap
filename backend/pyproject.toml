[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008"]  # FastAPI uses callables (Depends/File/Form) as arg defaults

[tool.ruff.lint.per-file-ignores]
# conftest deliberately orders imports around a DB-engine override.
"tests/*" = ["E501", "I001"]
