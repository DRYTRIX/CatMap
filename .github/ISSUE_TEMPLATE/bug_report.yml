name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve CatMap. Please include as much detail as you can.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect, and what actually happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open CatMap on ...
        2. Tap ...
        3. See error
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL (if relevant)
      placeholder: https://catmap.drytrix.com/...
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Desktop browser
        - Mobile browser
        - Installed PWA
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: e.g. Chrome 125 on Android 14
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, console errors, etc.
