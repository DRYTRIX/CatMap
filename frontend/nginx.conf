server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip for text assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Security headers (applied to documents below as well, since a location
    # with its own add_header does not inherit server-level ones).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    # img/connect use https: so OSM tiles, Nominatim and the API work without
    # hard-coding the backend origin. style 'unsafe-inline' is required by Leaflet.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https: http://localhost:8000; style-src 'self' 'unsafe-inline'; script-src 'self' https://www.googletagmanager.com; connect-src 'self' https: http://localhost:8000; font-src 'self' data:; manifest-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # Server-rendered share pages (Open Graph tags for social crawlers).
    location /s/ {
        proxy_pass ${BACKEND_URL}/s/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host ${BACKEND_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy API calls to the backend so the browser stays same-origin (no CORS).
    location /api/ {
        proxy_pass ${BACKEND_URL}/api/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host ${BACKEND_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 12m;
        proxy_read_timeout 120s;
    }

    # Hashed build assets can be cached aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the service worker or its registration.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache";
    }
    location = /env-config.js {
        add_header Cache-Control "no-cache";
    }

    # App shell: no-cache + repeat security headers (own add_header breaks inheritance).
    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https: http://localhost:8000; style-src 'self' 'unsafe-inline'; script-src 'self' https://www.googletagmanager.com; connect-src 'self' https: http://localhost:8000; font-src 'self' data:; manifest-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
