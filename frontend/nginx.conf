server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip for text assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Security headers (applied to documents below as well, since a location
    # with its own add_header does not inherit server-level ones).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    # img/connect use https: so OSM tiles, Nominatim and the API work without
    # hard-coding the backend origin. style 'unsafe-inline' is required by Leaflet.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https: http://localhost:8000; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https: http://localhost:8000; font-src 'self'; manifest-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # Hashed build assets can be cached aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the service worker or its registration.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache";
    }

    # App shell: no-cache + repeat security headers (own add_header breaks inheritance).
    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https: http://localhost:8000; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https: http://localhost:8000; font-src 'self'; manifest-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
